version: "3.8"

services:
  web:
    build: .
    container_name: iran_web
    environment:
      DB_HOST: db
      DB_PORT: 3307
      DB_NAME: iran_war_db
      DB_USER: iran
      DB_PASS: iran123
      DB_CHARSET: utf8mb4
      APP_BASE_URL: http://localhost:8080
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: iran_db
    restart: unless-stopped
    command: --port=3307
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iran_war_db
      MYSQL_USER: iran
      MYSQL_PASSWORD: iran123
    ports:
      - "3307:3307"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  db_data:
